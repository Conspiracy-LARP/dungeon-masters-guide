<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 600" role="img"
     aria-labelledby="ttl dsc" font-family="Georgia, 'Times New Roman', serif">
  <title id="ttl">Fabricated screenshot of a 1926 Hansard column that never existed</title>
  <desc id="dsc">This is a FAKE. It is a fabricated screenshot, dressed in the browser and
  website chrome of the 2009-era "Historic Hansard" site, of a House of Commons debate that never
  happened. It shows an invented exchange of 9 March 1926, headed ELEMENTARY EDUCATION (READING
  STANDARDS), in which a Mr Petherbridge asks the President of the Board of Education whether reading
  standards among elementary schoolchildren in the northern counties are satisfactory, and is told the
  matter is under review. No such debate took place, no such member sat, and the volume and column
  numbers are invented. This is an out-of-world teaching artifact demonstrating how easily documentary
  evidence is manufactured; it is not, and never was, a real government record.</desc>

  <!-- ===== base / outer window ===== -->
  <rect width="760" height="600" fill="#c4ccd6"/>

  <!-- ===== BROWSER CHROME ===== -->
  <!-- title bar -->
  <rect x="0" y="0" width="760" height="26" fill="#4b6ea8"/>
  <rect x="0" y="0" width="760" height="12" fill="#5a7cb6"/>
  <text x="12" y="18" fill="#ffffff" font-size="12" font-family="Helvetica, Arial, sans-serif">Historic Hansard &#8212; ELEMENTARY EDUCATION (READING STANDARDS) - Web Browser</text>
  <!-- window controls -->
  <rect x="694" y="6" width="16" height="14" fill="#d7deea" stroke="#37517d"/>
  <rect x="714" y="6" width="16" height="14" fill="#d7deea" stroke="#37517d"/>
  <rect x="734" y="6" width="16" height="14" fill="#c85b4d" stroke="#8a3b31"/>
  <line x1="698" y1="17" x2="706" y2="17" stroke="#37517d" stroke-width="2"/>
  <rect x="718" y="9" width="8" height="8" fill="none" stroke="#37517d" stroke-width="1.5"/>
  <line x1="738" y1="9" x2="746" y2="17" stroke="#ffffff" stroke-width="1.5"/>
  <line x1="746" y1="9" x2="738" y2="17" stroke="#ffffff" stroke-width="1.5"/>

  <!-- menu bar -->
  <rect x="0" y="26" width="760" height="20" fill="#eef1f6"/>
  <text x="12" y="40" fill="#333333" font-size="11" font-family="Helvetica, Arial, sans-serif">File   Edit   View   Favourites   Tools   Help</text>

  <!-- toolbar with back/forward + address bar -->
  <rect x="0" y="46" width="760" height="34" fill="#dfe4ec"/>
  <line x1="0" y1="80" x2="760" y2="80" stroke="#9aa4b2"/>
  <!-- back button (enabled) -->
  <circle cx="24" cy="63" r="12" fill="#f4f6fa" stroke="#9aa4b2"/>
  <path d="M28 57 L20 63 L28 69" fill="none" stroke="#3a6a3a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- forward button (dimmed) -->
  <circle cx="52" cy="63" r="12" fill="#eceef2" stroke="#c0c6d0"/>
  <path d="M48 57 L56 63 L48 69" fill="none" stroke="#b3b8c2" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- address label -->
  <text x="74" y="67" fill="#5a6472" font-size="11" font-family="Helvetica, Arial, sans-serif">Address</text>
  <!-- address bar -->
  <rect x="120" y="53" width="590" height="20" fill="#ffffff" stroke="#8a94a2"/>
  <rect x="124" y="56" width="10" height="14" fill="#c9d3e6"/>
  <text x="140" y="67" fill="#1a1a1a" font-size="11" font-family="Helvetica, Arial, sans-serif">http://hansard.millbanksystems.com/commons/1926/mar/09/elementary-education-reading-standards</text>
  <!-- Go button -->
  <rect x="714" y="53" width="38" height="20" fill="#eef1f6" stroke="#8a94a2"/>
  <text x="722" y="67" fill="#333333" font-size="11" font-family="Helvetica, Arial, sans-serif">Go</text>

  <!-- ===== CONTENT VIEWPORT ===== -->
  <rect x="0" y="80" width="744" height="500" fill="#ffffff"/>

  <!-- SITE CHROME: masthead -->
  <rect x="0" y="80" width="744" height="46" fill="#6c1c1c"/>
  <rect x="0" y="80" width="744" height="4" fill="#8a2626"/>
  <text x="20" y="105" fill="#ffffff" font-size="21" font-family="Georgia, 'Times New Roman', serif" font-weight="bold">Historic Hansard</text>
  <text x="21" y="120" fill="#e7c9c9" font-size="10.5" font-family="Helvetica, Arial, sans-serif" letter-spacing="1.5">HANSARD 1803&#8211;2005</text>
  <!-- masthead search box -->
  <rect x="560" y="94" width="128" height="18" fill="#ffffff"/>
  <text x="566" y="107" fill="#9a9a9a" font-size="11" font-family="Helvetica, Arial, sans-serif">Search Hansard</text>
  <rect x="690" y="94" width="34" height="18" fill="#3d0f0f"/>
  <text x="697" y="107" fill="#ffffff" font-size="10" font-family="Helvetica, Arial, sans-serif">Go</text>

  <!-- SITE CHROME: breadcrumb -->
  <rect x="0" y="126" width="744" height="22" fill="#f1ede3"/>
  <line x1="0" y1="148" x2="744" y2="148" stroke="#d8d1bf"/>
  <text x="20" y="141" fill="#5a4a2a" font-size="11" font-family="Helvetica, Arial, sans-serif">HC Deb &#8250; 1926 &#8250; March &#8250; 9 &#8250; ELEMENTARY EDUCATION (READING STANDARDS)</text>

  <!-- MAIN COLUMN -->
  <!-- citation line -->
  <text x="40" y="180" fill="#6a6a6a" font-size="12" font-family="Helvetica, Arial, sans-serif">HC Deb 09 March 1926 vol 192 cc2103&#8211;4</text>
  <line x1="40" y1="188" x2="620" y2="188" stroke="#dcdcdc"/>

  <!-- title -->
  <text x="40" y="214" font-size="17" font-weight="bold" fill="#111111" letter-spacing="0.6">ELEMENTARY EDUCATION (READING STANDARDS).</text>

  <!-- column number 2103 -->
  <text x="700" y="240" font-size="11" fill="#9a9a9a" text-anchor="end" font-family="Helvetica, Arial, sans-serif">&#167; 2103</text>
  <line x1="656" y1="234" x2="700" y2="234" stroke="#e2e2e2"/>

  <!-- debate body -->
  <g font-size="13.5" fill="#1a1a1a">
    <text x="40" y="244"><tspan font-weight="bold" letter-spacing="0.4">Mr. PETHERBRIDGE</tspan> asked the President of the Board of Education</text>
    <text x="40" y="264">whether he is satisfied that standards of reading among elementary</text>
    <text x="40" y="284">schoolchildren in the northern counties are satisfactory; and what</text>
    <text x="40" y="304">steps are being taken to that end.</text>

    <text x="40" y="338"><tspan font-weight="bold">The PRESIDENT of the BOARD of EDUCATION:</tspan> I am aware of</text>
    <text x="40" y="358">the figures to which my hon. Friend refers. The matter is under review.</text>

    <text x="40" y="392"><tspan font-weight="bold">Mr. PETHERBRIDGE:</tspan> Is the right hon. Gentleman aware that the</text>
    <text x="40" y="412">position in Durham has not improved since 1921, and can he say</text>
    <text x="40" y="432">which Department is now seised of the question?</text>
  </g>

  <!-- column number 2104 -->
  <text x="700" y="466" font-size="11" fill="#9a9a9a" text-anchor="end" font-family="Helvetica, Arial, sans-serif">&#167; 2104</text>
  <line x1="656" y1="460" x2="700" y2="460" stroke="#e2e2e2"/>

  <g font-size="13.5" fill="#1a1a1a">
    <text x="40" y="470"><tspan font-weight="bold">The PRESIDENT of the BOARD of EDUCATION:</tspan> I would not accept</text>
    <text x="40" y="490">the hon. Member's figures. As to the second part of the Question,</text>
    <text x="40" y="510">I must ask for notice.</text>
  </g>

  <!-- prev / next nav -->
  <line x1="40" y1="528" x2="700" y2="528" stroke="#dcdcdc"/>
  <text x="40" y="548" font-size="12" fill="#6c1c1c" font-family="Helvetica, Arial, sans-serif">&#8249; Previous</text>
  <text x="370" y="548" font-size="12" fill="#8a8a8a" text-anchor="middle" font-family="Helvetica, Arial, sans-serif">Column 2103</text>
  <text x="700" y="548" font-size="12" fill="#6c1c1c" text-anchor="end" font-family="Helvetica, Arial, sans-serif">Next &#8250;</text>

  <!-- site footer -->
  <rect x="0" y="562" width="744" height="18" fill="#f1ede3"/>
  <line x1="0" y1="562" x2="744" y2="562" stroke="#d8d1bf"/>
  <text x="20" y="575" fill="#7a6a4a" font-size="10" font-family="Helvetica, Arial, sans-serif">Historic Hansard &#8212; House of Commons and Lords sittings 1803&#8211;2005 &#8212; HTML transcript</text>

  <!-- ===== BROWSER SCROLLBAR ===== -->
  <rect x="744" y="80" width="16" height="500" fill="#e9ecf1"/>
  <rect x="744" y="80" width="16" height="16" fill="#dfe4ec" stroke="#c0c6d0"/>
  <path d="M748 90 L752 84 L756 90" fill="none" stroke="#7a828e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="744" y="564" width="16" height="16" fill="#dfe4ec" stroke="#c0c6d0"/>
  <path d="M748 570 L752 576 L756 570" fill="none" stroke="#7a828e" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="746" y="100" width="12" height="150" rx="2" fill="#b7bfca" stroke="#9aa4b2"/>

  <!-- ===== STATUS BAR ===== -->
  <rect x="0" y="580" width="760" height="20" fill="#dfe4ec"/>
  <line x1="0" y1="580" x2="760" y2="580" stroke="#9aa4b2"/>
  <text x="10" y="594" fill="#4a5462" font-size="10" font-family="Helvetica, Arial, sans-serif">Done</text>
  <text x="700" y="594" fill="#4a5462" font-size="10" text-anchor="end" font-family="Helvetica, Arial, sans-serif">Internet</text>
</svg>
