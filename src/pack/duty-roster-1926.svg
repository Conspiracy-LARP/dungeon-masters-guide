<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 470" role="img" aria-labelledby="t d"
     font-family="'Courier New', monospace">
  <title id="t">Fabricated artifact: a 1926 duty roster for an office that never existed</title>
  <desc id="d">An invented War Office duty roster, stamped SECRET and headed Directorate of
  Reading Standards, Room 4, for the week commencing 8 March 1926. It lists clerical staff
  against duties: Hopper on Periodicals, Francis on Verse, Berry on Verse, Sylvia on the
  typing pool, and a Chief Clerk. A footnote records that requisitions for the Reading Room
  are to be countersigned by the Brigadier-General in person. No such office existed and no
  such roster was typed. This image is a fake, generated to demonstrate how easily
  documentary evidence is manufactured.</desc>
  <rect width="640" height="470" fill="#efe9d8"/>
  <rect x="28" y="24" width="584" height="422" fill="#f7f2e4" stroke="#c8bfa4"/>
  <g transform="rotate(-6 470 66)">
    <rect x="404" y="42" width="132" height="34" fill="none" stroke="#9c2a24" stroke-width="2.5"/>
    <text x="470" y="66" fill="#9c2a24" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="3">SECRET</text>
  </g>
  <text x="56" y="66" font-size="12" fill="#4a4234" letter-spacing="2">WAR OFFICE</text>
  <text x="56" y="98" font-size="16" fill="#241f18" font-weight="bold" letter-spacing="1">DIRECTORATE OF READING STANDARDS</text>
  <text x="56" y="118" font-size="12.5" fill="#4a4234">Room 4</text>
  <line x1="56" y1="134" x2="584" y2="134" stroke="#b8ad90"/>
  <text x="56" y="158" font-size="12.5" fill="#241f18">DUTY ROSTER — week commencing 8th March 1926</text>
  <line x1="56" y1="176" x2="584" y2="176" stroke="#d8cfb4"/>
  <text x="56" y="204" font-size="12.5" fill="#4a4234">CLERICAL</text>
  <text x="240" y="204" font-size="12.5" fill="#4a4234">DUTY</text>
  <text x="452" y="204" font-size="12.5" fill="#4a4234">RETURN BY</text>
  <line x1="56" y1="214" x2="584" y2="214" stroke="#d8cfb4"/>
  <text x="56" y="242" font-size="13" fill="#241f18">Hopper, M.</text>
  <text x="240" y="242" font-size="13" fill="#241f18">Periodicals</text>
  <text x="452" y="242" font-size="13" fill="#241f18">Fri. 17.00</text>
  <text x="56" y="270" font-size="13" fill="#241f18">Francis, F.</text>
  <text x="240" y="270" font-size="13" fill="#241f18">Verse (assessment)</text>
  <text x="452" y="270" font-size="13" fill="#241f18">Thu. 12.00</text>
  <text x="56" y="298" font-size="13" fill="#241f18">Berry, P.</text>
  <text x="240" y="298" font-size="13" fill="#241f18">Verse (assessment)</text>
  <text x="452" y="298" font-size="13" fill="#241f18">Thu. 12.00</text>
  <text x="56" y="326" font-size="13" fill="#241f18">Sylvia</text>
  <text x="240" y="326" font-size="13" fill="#241f18">Typing pool</text>
  <text x="452" y="326" font-size="13" fill="#241f18">Daily</text>
  <text x="56" y="354" font-size="13" fill="#241f18">Chief Clerk</text>
  <text x="240" y="354" font-size="13" fill="#241f18">Room 4 (establishment)</text>
  <text x="452" y="354" font-size="13" fill="#241f18">Mon. 09.00</text>
  <line x1="56" y1="378" x2="584" y2="378" stroke="#d8cfb4"/>
  <text x="56" y="404" font-size="11.5" fill="#4a4234">2. Requisitions for the Reading Room are to be countersigned by the</text>
  <text x="56" y="422" font-size="11.5" fill="#4a4234">Brigadier-General in person. No exception is to be made.</text>
</svg>
